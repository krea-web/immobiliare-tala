    <style>
        :root {
            --bg-primary: #FAFAF9;
            --text-primary: #1C1917;
            --text-secondary: #78716C;
        }

        .dark {
            --bg-primary: #0C0A09;
            --text-primary: #FAFAF9;
            --text-secondary: #A8A29E;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.6s cubic-bezier(0.4, 0, 0.2, 1), color 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        *, *::before, *::after {
            transition: border-color 0.4s ease, background-color 0.4s ease, color 0.4s ease, opacity 0.4s ease, box-shadow 0.4s ease;
        }

        html.dark .bg-white { background-color: #1C1917 !important; color: #FAFAF9; }
        html.dark .bg-[#FAFAF9] { background-color: #0C0A09 !important; }
        html.dark .text-[#1C1917] { color: #FAFAF9 !important; }
        html.dark .text-stone-500 { color: #A8A29E !important; }
        html.dark .border-stone-200 { border-color: rgba(255,255,255,0.08) !important; }
        html.dark .border-stone-100 { border-color: rgba(255,255,255,0.04) !important; }
        html.dark .bg-stone-50 { background-color: rgba(255,255,255,0.02) !important; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: #D6D3D1; border-radius: 20px; }
        html.dark ::-webkit-scrollbar-thumb { background-color: #333; }

        .glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        html.dark .glass {
            background: rgba(12, 10, 9, 0.8);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .page-transition {
            animation: fadeInScale 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.98) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
  </head>
